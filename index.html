<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 🎉</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }
  </style>
</head>

<body class="min-h-screen w-full flex items-center justify-center px-4 py-8 m-0">

  <div class="bg-white/80 backdrop-blur-md p-6 sm:p-8 rounded-2xl shadow-2xl text-center max-w-md w-full transform hover:scale-[1.01] transition duration-300">
    <h1 class="text-4xl font-extrabold text-pink-600 mb-4 animate-bounce">
      Happy Birthday! 🎂
    </h1>
    
    <div class="mb-6 overflow-hidden rounded-xl shadow-md border-4 border-white bg-white">
      <img src="WhatsApp Image 2026-06-15 at 10.30.47.jpeg" alt="Birthday Celebration" class="w-full h-auto max-h-[450px] object-contain block mx-auto">
    </div>
    
    <p class="text-gray-800 text-base sm:text-lg mb-6 font-semibold italic bg-pink-50/60 p-4 rounded-xl border border-pink-100 shadow-sm leading-relaxed">
      "Happy birthday baunii tu bahut choti hai baaki insaanon se lekin tu bahut achi bhi haii hamesha khush reh aur tu wo sab paaye jo tu chahti hai" ✨
    </p>

    <div class="flex flex-col gap-4 items-center">
      <button 
        onclick="celebrate()" 
        class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transform active:scale-95 transition duration-150"
      >
        🎉 Celebrate!
      </button>

      <button 
        id="surpriseBtn"
        onclick="revealSurprise()" 
        class="w-full bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transform active:scale-95 transition duration-150"
      >
        🎁 Reveal Surprise
      </button>

      <div id="surpriseLink" class="hidden mt-2 p-3 bg-emerald-100 border border-emerald-300 rounded-xl w-full text-center">
        <a 
          href="https://open.spotify.com/playlist/2YmhgUDDQrayz2eMpbnitk?si=64797a403505466b&pt=f5dddc42ab5effdd9c260a1c015ce9b0" 
          target="_blank" 
          class="text-emerald-700 font-bold hover:underline text-lg block animate-pulse"
        >
          👉 Tap This! 👈
        </a>
      </div>
    </div>
  </div>

  <script>
    // Trigger confetti on page load
    window.addEventListener('DOMContentLoaded', () => {
      celebrate();
    });

    // Confetti function
    function celebrate() {
      confetti({
        particleCount: 150,
        spread: 80,
        origin: { y: 0.6 }
      });
    }

    // Reveal surprise function
    function revealSurprise() {
      celebrate();
      
      const linkDiv = document.getElementById('surpriseLink');
      linkDiv.classList.remove('hidden');
      
      const btn = document.getElementById('surpriseBtn');
      btn.textContent = "Surprise Unlocked! ✨";
      btn.disabled = true;
      btn.className = "w-full bg-gray-400 text-white font-bold py-3 px-6 rounded-full cursor-not-allowed shadow";
    }
  </script>

</body>
</html>
